global_:
  seed: 42
  deterministic: false

model:
  base_model: Qwen/Qwen3-1.7B
  blip2_model: Salesforce/blip2-opt-2.7b
  init_from_stage1: ./qwen3-1.7B-Nemotron-lora-stage1-full
  load_stage1_lora: true
  lora:
    r: 64
    lora_alpha: 16
    lora_dropout: 0.1
    target_modules: ["q_proj", "v_proj"]
    task_type: CAUSAL_LM
    bias: none

data:
  dataset: qingwuuu/ngld-grape-leaf-vlm-w-img-without-diff-ref-v2-test
  max_prompt_len: 64
  max_answer_len: 1539

training:
  out_dir: ./results_GreenHouse_NGLD
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 2e-4
  logging_steps: 25
  save_steps: 200
  evaluation_strategy: "no"
  eval_steps: 200
  fp16: true
  bf16: false
  report_to: none
  gradient_checkpointing: true
  remove_unused_columns: false
  dataloader_pin_memory: true
  save_safetensors: false
  save_strategy: "no"
  new_model_dir: ./qwen3-1.7B-greenhouse-ngld-lora-1
  resume_from_checkpoint: null
  eval_delay: 100
  dataloader_drop_last: false
  dataloader_num_workers: 4
  prediction_loss_only: false
  load_best_model_at_end: false
  metric_for_best_model: rougeL
  greater_is_better: true
  label_names: ["labels"]
  use_weighted_loss: true
