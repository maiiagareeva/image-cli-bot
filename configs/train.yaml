global:
  seed: 42
  deterministic: false

model:
  base_model: Qwen/Qwen3-1.7B
  clip_model: openai/clip-vit-base-patch32
  prefix_len: 20
  qwen_dim: 2048
  lora:
    r: 64
    lora_alpha: 16
    lora_dropout: 0.1
    target_modules: ["q_proj", "v_proj"]
    task_type: CAUSAL_LM
    bias: none

data:
  dataset: qingwuuu/ngld-grape-leaf-vlm-w-img-without-diff-ref
  max_prompt_len: 256
  max_answer_len: 256

training:
  out_dir: ./results_mm_1
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 2e-4
  logging_steps: 25
  save_steps: 200
  evaluation_strategy: steps
  eval_steps: 200
  fp16: true
  report_to: none
  gradient_checkpointing: true
  remove_unused_columns: false
  dataloader_pin_memory: true
  save_safetensors: false
  save_strategy: steps
  new_model_dir: ./qwen3-1.7B-ngld-lora-1
  mapping_dir: mapping.pt

stage:
  name: MAPPING_TRAIN
  mapping_cpkt: ""
